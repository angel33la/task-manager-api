name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build client
        run: npm run build:client

      - name: Start API
        run: NODE_ENV=production PORT=4000 node server/standalone.cjs &

      - name: Wait for API
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:4000/api > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "API did not start in time"
          exit 1

      - name: Smoke checks
        run: npm run test:smoke

  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build client
        run: npm run build:client

      - name: Start API
        run: NODE_ENV=production PORT=4000 node server/standalone.cjs &

      - name: Wait for API
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:4000/api > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "API did not start in time"
          exit 1

      - name: Run Lighthouse
        run: |
          npx --yes lighthouse http://localhost:4000 \
            --chrome-flags="--headless --no-sandbox" \
            --output=json --output=html \
            --output-path=./lighthouse-report

      - name: Upload Lighthouse artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: |
            lighthouse-report.report.json
            lighthouse-report.report.html
